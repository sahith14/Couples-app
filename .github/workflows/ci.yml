name: Typecheck + lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false

      - name: TypeScript — shared
        run: pnpm --filter @soulsync/shared exec tsc --noEmit

      - name: TypeScript — mobile
        run: pnpm --filter @soulsync/mobile exec tsc --noEmit

      - name: TypeScript — admin
        run: pnpm --filter @soulsync/admin exec tsc --noEmit
